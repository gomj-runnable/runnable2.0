# ============================================================
# Runnable — docker-compose 운영 형상 (compose 패키지)
#
# 위치: compose/docker-compose.yml
# 빌드 컨텍스트: 프로젝트 루트 (..)
#
# 실행 (프로젝트 루트에서):
#   docker compose -f compose/docker-compose.yml --env-file compose/.env.prod up -d
# 또는 compose 디렉토리에서:
#   cd compose && docker compose --env-file .env.prod up -d
#
# Services:
#   - db        : PostGIS 17 (named volume 영속)
#   - app       : Nuxt .output 컨테이너 (외부 :3333 → 내부 :3000)
#   - migrate   : drizzle-kit push + seed (profile: migrate, 일회성)
#   - jenkins   : CI/CD (jenkins_home 볼륨 + docker.sock 마운트)
#
# 외부 노출 (Tailscale Funnel 이미 :3333 으로 연결):
#   https://<INTERNAL_HOST> → localhost:3333 → runnable_app_prod:3000
# ============================================================

services:
    db:
        image: imresamu/postgis:17-3.5-alpine
        container_name: runnable_db_prod
        restart: unless-stopped
        command: ['postgres', '-c', 'timezone=Asia/Seoul']
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
            TZ: Asia/Seoul
            PGDATA: /var/lib/postgresql/data/pgdata
        volumes:
            - runnable_db_prod_data:/var/lib/postgresql/data
        ports:
            # 충돌 회피: 기존 dev runnable_db(6432) 와 분리
            - '127.0.0.1:5433:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - runnable_net
        mem_limit: 1g
        cpus: 1.0

    app:
        build:
            context: ..
            dockerfile: compose/Dockerfile
        image: runnable-app:latest
        container_name: runnable_app_prod
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env.prod
        environment:
            DATABASE_URL: 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}'
            # Nuxt runtimeConfig 런타임 오버라이드 (NUXT_ 접두사 필요)
            NUXT_PUBLIC_ROUTE_MODE: ${ROUTE_MODE}
            NUXT_TMAP_API: ${TMAP_API}
            HOST: 0.0.0.0
            PORT: '3000'
        ports:
            # Tailscale Funnel 이 이미 :3333 으로 연결됨 — 변경 시 funnel 재구성 필요
            - '3333:3000'
        volumes:
            - runnable_uploads:/app/public/uploads
        healthcheck:
            test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1']
            interval: 15s
            timeout: 5s
            retries: 6
            start_period: 20s
        networks:
            - runnable_net
        mem_limit: 1536m
        cpus: 2.0

    migrate:
        profiles: ['migrate']
        build:
            context: ..
            dockerfile: compose/Dockerfile.migrate
        image: runnable-migrate:latest
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env.prod
        environment:
            DATABASE_URL: 'postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}'
            DATABASE_MODE: POSTGRES
        networks:
            - runnable_net

    jenkins:
        image: jenkins/jenkins:lts
        container_name: jenkins
        restart: unless-stopped
        user: root # docker.sock 접근 위해
        environment:
            JENKINS_OPTS: '--prefix=/'
            TZ: Asia/Seoul
        ports:
            - '8080:8080'
            - '50000:50000'
        volumes:
            - jenkins_home:/var/jenkins_home
            - /var/run/docker.sock:/var/run/docker.sock
            # 호스트 docker CLI 재사용 — Jenkinsfile 의 `docker compose` 호출 가능하게
            - /opt/homebrew/bin/docker:/usr/local/bin/docker:ro
        networks:
            - runnable_net

volumes:
    runnable_db_prod_data:
    runnable_uploads:
    jenkins_home:

networks:
    runnable_net:
        driver: bridge
