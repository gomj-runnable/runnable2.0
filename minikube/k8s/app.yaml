apiVersion: apps/v1
kind: Deployment
metadata:
  name: runnable-app
  namespace: runnable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runnable-app
  template:
    metadata:
      labels:
        app: runnable-app
    spec:
      containers:
        - name: app
          image: runnable-app:latest
          imagePullPolicy: Never  # minikube 로컬 이미지 사용
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: runnable-config
            - secretRef:
                name: runnable-secret
          env:
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: runnable-app
  namespace: runnable
spec:
  type: NodePort
  selector:
    app: runnable-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
