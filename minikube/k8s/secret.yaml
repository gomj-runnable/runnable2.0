# ============================================================
# 운영 배포 시 모든 값을 실제 값으로 교체할 것
# WEBHOOK_SECRET은 GitHub Webhook 설정의 Secret과 동일해야 함
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: runnable-secret
  namespace: runnable
type: Opaque
stringData:
  POSTGRES_USER: root
  POSTGRES_PASSWORD: root1234
  POSTGRES_DB: runnable
  BETTER_AUTH_SECRET: minikube-dev-secret-key
  GITHUB_TOKEN: ""
  WEATHER_KOR: ""
  OPEN_DATA: ""
  TMAP_API: ""
  WEBHOOK_SECRET: change-me-to-random-string
