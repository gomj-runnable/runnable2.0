# --- ServiceAccount ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-watcher
  namespace: runnable
---
# --- Role: deployment patch 권한 ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-updater
  namespace: runnable
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
# --- RoleBinding ---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-watcher-binding
  namespace: runnable
subjects:
  - kind: ServiceAccount
    name: image-watcher
    namespace: runnable
roleRef:
  kind: Role
  name: deployment-updater
  apiGroup: rbac.authorization.k8s.io
---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-watcher
  namespace: runnable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-watcher
  template:
    metadata:
      labels:
        app: image-watcher
    spec:
      serviceAccountName: image-watcher
      containers:
        - name: watcher
          image: image-watcher:latest
          imagePullPolicy: Never  # minikube 로컬 빌드 이미지
          ports:
            - containerPort: 3001
          env:
            - name: GHCR_IMAGE
              value: ghcr.io/all4land-runnable/runnable2.0
            - name: IMAGE_TAG
              value: latest
            - name: POLL_INTERVAL
              value: "60"            # 초 단위 (기본 60초)
            - name: TARGET_NAMESPACE
              value: runnable
            - name: TARGET_DEPLOYMENT
              value: runnable-app
            - name: TARGET_CONTAINER
              value: app
            - name: GHCR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: runnable-secret
                  key: GHCR_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 30m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
# --- Service (상태 확인용) ---
apiVersion: v1
kind: Service
metadata:
  name: image-watcher
  namespace: runnable
spec:
  type: ClusterIP
  selector:
    app: image-watcher
  ports:
    - port: 3001
      targetPort: 3001
