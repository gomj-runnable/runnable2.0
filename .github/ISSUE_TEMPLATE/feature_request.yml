name: Feature Request
description: 새로운 기능을 제안합니다
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안을 작성해주셔서 감사합니다.

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 문제를 해결하고 싶으신가요?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방법
      description: 어떤 방식으로 해결하면 좋을지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려해본 다른 방법이 있다면 작성해주세요.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 추가 정보
      description: 참고할 만한 정보가 있다면 작성해주세요.
    validations:
      required: false
