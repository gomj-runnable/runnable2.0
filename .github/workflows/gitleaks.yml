name: Gitleaks

on:
    pull_request:
    push:
        branches: [master]
    workflow_dispatch:

jobs:
    scan:
        name: Secret Scan
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  # 전체 히스토리 스캔이 가능하도록 fetch
                  fetch-depth: 0

            # 공식 gitleaks-action 은 org 라이선스를 요구하므로
            # OSS 바이너리를 직접 받아 실행한다 (라이선스 불필요).
            - name: Install gitleaks
              run: |
                  curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
                      | sudo tar -xz -C /usr/local/bin gitleaks
                  gitleaks version

            - name: Run gitleaks
              run: |
                  gitleaks detect \
                      --config .gitleaks.toml \
                      --source . \
                      --no-banner \
                      --redact \
                      --verbose \
                      --report-format sarif \
                      --report-path gitleaks.sarif \
                      --exit-code 1

            - name: Upload SARIF
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: gitleaks-sarif
                  path: gitleaks.sarif
                  retention-days: 7
