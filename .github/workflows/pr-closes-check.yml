name: PR Closes Keyword Check

on:
    pull_request:
        types: [opened, edited, synchronize, ready_for_review, labeled, unlabeled]

jobs:
    check-closes:
        name: Closes #N keyword
        runs-on: ubuntu-latest
        steps:
            - name: Verify auto-close keyword in PR body
              uses: actions/github-script@v7
              env:
                  PR_BODY: ${{ github.event.pull_request.body }}
                  PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
              with:
                  script: |
                      const body = process.env.PR_BODY || '';
                      const labels = JSON.parse(process.env.PR_LABELS || '[]');

                      if (labels.includes('no-issue')) {
                        core.info('Skipped: `no-issue` label present.');
                        return;
                      }

                      const pattern = /\b(closes|fixes|resolves)\s+#\d+/i;
                      if (pattern.test(body)) {
                        const match = body.match(pattern);
                        core.info(`OK: found auto-close keyword "${match[0]}".`);
                        return;
                      }

                      core.setFailed(
                        'PR body must contain a GitHub auto-close keyword (`Closes #N`, `Fixes #N`, or `Resolves #N`).\n' +
                        'Reason: subject references like `(#123)` are NOT auto-close triggers — only body keywords are.\n' +
                        'If this PR genuinely has no associated issue, apply the `no-issue` label to bypass.'
                      );
