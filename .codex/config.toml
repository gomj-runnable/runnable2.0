# Project-scoped Codex configuration for Runnable
# Reference: https://developers.openai.com/codex/config-sample

[features]
multi_agent = true

[agents]
# Keep parallelism conservative to reduce context noise in this repo.
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800

[agents.architect]
description = "Design task briefs and file-level plans before any code change."
config_file = "agents/architect.toml"

[agents.builder]
description = "Implement exactly what the architect brief specifies."
config_file = "agents/builder.toml"

[agents.reviewer]
description = "Review only changed scope for regressions, risks, and brief compliance."
config_file = "agents/reviewer.toml"
